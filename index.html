<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Belbet - Carregando...</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0a1f1e 0%, #0c2a2a 100%);
            min-height: 100vh;
            padding: 16px;
        }
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #0affb3;
            font-size: 1.5rem;
            flex-direction: column;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #1e5a52;
            border-top: 4px solid #0affb3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(8, 28, 26, 0.92);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid #00ffaa30;
        }
        .header {
            background: #071a18e0;
            padding: 1rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #00ffaa40;
        }
        .logo h1 {
            color: #00f7b0;
            font-size: 1.8rem;
            text-shadow: 0 0 5px #00cc88;
        }
        .logo span {
            font-size: 0.7rem;
            color: #9bffe0;
            display: block;
        }
        .user-area {
            background: #0b2a26;
            padding: 6px 16px;
            border-radius: 60px;
            display: flex;
            gap: 12px;
            align-items: baseline;
            flex-wrap: wrap;
        }
        .balance {
            background: #00a87e40;
            padding: 4px 12px;
            border-radius: 30px;
            color: #ccffea;
            font-weight: bold;
        }
        .btn-logout, .btn-admin {
            background: #3a2c2c;
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            color: #ffc5c5;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-admin { background: #1e5a52; color: #0affb3; }
        .dashboard { padding: 20px; }
        .section-title {
            color: #9effdf;
            font-weight: 600;
            border-left: 4px solid #0affb3;
            padding-left: 14px;
            margin: 16px 0;
            font-size: 1.3rem;
        }
        .match-card {
            background: #0b2926;
            border-radius: 1.4rem;
            margin-bottom: 18px;
            padding: 14px;
            border: 1px solid #2d5e57;
        }
        .match-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 10px;
        }
        .league { background: #0e403a; padding: 2px 10px; border-radius: 30px; }
        .live-badge { color: #ff9f9f; animation: pulse 1s infinite; font-weight: bold; }
        @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #ffffe0;
            margin: 10px 0;
        }
        .score {
            font-size: 1.8rem;
            font-family: monospace;
            background: #04100e;
            padding: 0 12px;
            border-radius: 40px;
        }
        .odds-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .odd-btn {
            background: #152e2b;
            border: none;
            padding: 8px 12px;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            flex: 1;
            min-width: 80px;
            border-bottom: 2px solid #00ad85;
            font-size: 0.85rem;
        }
        .bet-panel {
            background: #071f1cee;
            border-radius: 1.6rem;
            padding: 1.2rem;
            margin-top: 20px;
            border: 1px solid #00cca360;
        }
        .selected-match {
            background: #0d3a34;
            padding: 10px;
            border-radius: 50px;
            text-align: center;
            margin: 12px 0;
        }
        .bet-input {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        .bet-input input {
            flex: 2;
            background: #0b1f1c;
            border: 1px solid #2ebb9b;
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-size: 1rem;
        }
        .place-bet {
            background: #00d69e;
            border: none;
            padding: 0 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #001e1a;
            cursor: pointer;
        }
        .place-bet:disabled { background: #517a6f; cursor: not-allowed; }
        .message { background: #0e2c28; padding: 8px; border-radius: 40px; text-align: center; font-size: 0.8rem; margin-top: 10px; }
        .history-list { max-height: 200px; overflow-y: auto; margin-top: 15px; font-size: 0.7rem; }
        .history-item { background: #12302c; margin: 6px 0; padding: 8px; border-radius: 20px; }
        .form-container { padding: 30px 20px; }
        .form-card { background: #07211ee0; border-radius: 2rem; padding: 25px; }
        .form-card input { width: 100%; margin: 10px 0; padding: 14px; border-radius: 60px; background: #1e3e3a; border: none; color: white; font-size: 1rem; }
        .form-card button { background: #0affb3; width: 100%; padding: 12px; border-radius: 60px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .switch-link { color: #bcffe6; margin-top: 15px; display: inline-block; text-decoration: underline; cursor: pointer; }
        .hidden { display: none; }
        .footer { text-align: center; padding: 12px; font-size: 0.65rem; color: #4dae97; border-top: 1px solid #248b74; }
        .suspended-banner { background: #aa3333cc; text-align: center; padding: 12px; color: white; font-weight: bold; }
        .alert-message { background: #ffaa33; color: #1a1a2e; padding: 10px; text-align: center; border-radius: 20px; margin-bottom: 15px; }
    </style>
</head>
<body>
<div id="root">
    <div class="loading-container">
        <div class="spinner"></div>
        <div>Carregando Belbet...</div>
    </div>
</div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyCWAopv0PtTL9VrqnYyLlOqEVksrPSiGwE",
        authDomain: "shop-mall-ce15d.firebaseapp.com",
        projectId: "shop-mall-ce15d",
        storageBucket: "shop-mall-ce15d.firebasestorage.app",
        messagingSenderId: "320942334972",
        appId: "1:320942334972:web:0807308db6ae1b51944879",
        measurementId: "G-G65P6NCK32"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    // Coleções
    const USERS_COLL = "belbet_users_v2";
    const BETS_COLL = "belbet_bets_v2";
    const MATCHES_COLL = "belbet_matches_v2";
    const CONFIG_COLL = "belbet_config";
    
    let currentUser = null;
    let matches = [];
    let currentSelected = null;
    let siteConfig = { name: "Belbet", logo: "⚽", primaryColor: "#0affb3" };
    
    // Partidas padrão
    const defaultMatches = [
        { id: 1, league: "UEFA Champions", home: "Real Madrid", away: "Bayern", homeScore: 1, awayScore: 1, minute: 34, odds: { home: 2.10, draw: 3.40, away: 3.20 } },
        { id: 2, league: "Premier League", home: "Manchester City", away: "Arsenal", homeScore: 0, awayScore: 0, minute: 18, odds: { home: 1.85, draw: 3.60, away: 4.00 } },
        { id: 3, league: "Brasileirão", home: "Flamengo", away: "Palmeiras", homeScore: 1, awayScore: 1, minute: 56, odds: { home: 2.30, draw: 3.20, away: 2.90 } },
        { id: 4, league: "LaLiga", home: "Barcelona", away: "Atlético", homeScore: 0, awayScore: 0, minute: 27, odds: { home: 1.95, draw: 3.30, away: 3.80 } }
    ];
    
    async function loadConfig() {
        const doc = await db.collection(CONFIG_COLL).doc("siteConfig").get();
        if (doc.exists) {
            siteConfig = doc.data();
        } else {
            await db.collection(CONFIG_COLL).doc("siteConfig").set(siteConfig);
        }
    }
    
    async function initMatches() {
        const snapshot = await db.collection(MATCHES_COLL).get();
        if (snapshot.empty) {
            for (let m of defaultMatches) {
                await db.collection(MATCHES_COLL).doc(m.id.toString()).set(m);
            }
            matches = [...defaultMatches];
        } else {
            matches = [];
            snapshot.forEach(doc => matches.push(doc.data()));
            matches.sort((a,b) => a.id - b.id);
        }
        return matches;
    }
    
    async function updateMatchInFirestore(match) {
        await db.collection(MATCHES_COLL).doc(match.id.toString()).set(match);
    }
    
    function startLiveSimulation() {
        setInterval(async () => {
            for (let i = 0; i < matches.length; i++) {
                const m = matches[i];
                if (m.minute >= 90) continue;
                let newMinute = Math.min(90, m.minute + Math.floor(Math.random() * 3));
                let newHome = m.homeScore;
                let newAway = m.awayScore;
                if (newMinute < 90 && Math.random() < 0.08) {
                    if (Math.random() > 0.5) newHome += 1;
                    else newAway += 1;
                }
                let diff = newHome - newAway;
                let newOdds = { ...m.odds };
                if (diff > 0) {
                    newOdds.home = Math.max(1.2, m.odds.home - 0.07);
                    newOdds.draw = m.odds.draw + 0.12;
                    newOdds.away = m.odds.away + 0.20;
                } else if (diff < 0) {
                    newOdds.away = Math.max(1.2, m.odds.away - 0.07);
                    newOdds.draw = m.odds.draw + 0.12;
                    newOdds.home = m.odds.home + 0.20;
                } else {
                    newOdds.draw = Math.max(2.3, m.odds.draw - 0.05);
                }
                matches[i] = {
                    ...m,
                    minute: newMinute,
                    homeScore: newHome,
                    awayScore: newAway,
                    odds: {
                        home: parseFloat(newOdds.home.toFixed(2)),
                        draw: parseFloat(newOdds.draw.toFixed(2)),
                        away: parseFloat(newOdds.away.toFixed(2))
                    }
                };
                await updateMatchInFirestore(matches[i]);
            }
            if (currentUser) {
                await resolveFinishedBets();
                await refreshUserData();
                renderApp();
            } else {
                renderApp();
            }
        }, 8000);
    }
    
    async function resolveFinishedBets() {
        if (!currentUser) return;
        const finishedMatches = matches.filter(m => m.minute >= 90);
        if (finishedMatches.length === 0) return;
        const betsSnapshot = await db.collection(BETS_COLL).where("username", "==", currentUser.username).get();
        let balanceDelta = 0;
        const historyUpdates = [];
        for (const docSnap of betsSnapshot.docs) {
            const bet = docSnap.data();
            const match = matches.find(m => m.id === bet.matchId);
            if (match && match.minute >= 90) {
                let result = match.homeScore > match.awayScore ? "home" : (match.homeScore < match.awayScore ? "away" : "draw");
                const won = (bet.selection === result);
                if (won) {
                    balanceDelta += bet.stake * bet.odds;
                } else {
                    balanceDelta -= bet.stake;
                }
                historyUpdates.push({
                    date: new Date().toLocaleString(),
                    match: `${match.home} x ${match.away}`,
                    betPick: bet.selection,
                    stake: bet.stake,
                    result: won ? "VENCEU" : "PERDEU",
                    profit: won ? (bet.stake * bet.odds - bet.stake) : -bet.stake
                });
                await docSnap.ref.delete();
            }
        }
        if (balanceDelta !== 0 && currentUser && !currentUser.suspended) {
            const newBalance = Math.max(0, currentUser.balance + balanceDelta);
            await db.collection(USERS_COLL).doc(currentUser.username).update({
                balance: newBalance,
                history: firebase.firestore.FieldValue.arrayUnion(...historyUpdates)
            });
            currentUser.balance = newBalance;
            if (!currentUser.history) currentUser.history = [];
            currentUser.history.unshift(...historyUpdates);
        }
    }
    
    async function refreshUserData() {
        if (!currentUser) return;
        const userDoc = await db.collection(USERS_COLL).doc(currentUser.username).get();
        if (userDoc.exists) currentUser = userDoc.data();
    }
    
    // Cadastro completo
    async function register(fullData) {
        const { username, password, fullName, cpf, phone } = fullData;
        const userDoc = await db.collection(USERS_COLL).doc(username).get();
        if (userDoc.exists) return false;
        const newUser = {
            username, password, fullName, cpf, phone,
            balance: 150.00,
            history: [],
            suspended: false,
            suspensionReason: "",
            createdAt: new Date().toISOString()
        };
        await db.collection(USERS_COLL).doc(username).set(newUser);
        return true;
    }
    
    async function login(username, password) {
        const userDoc = await db.collection(USERS_COLL).doc(username).get();
        if (userDoc.exists && userDoc.data().password === password) {
            currentUser = userDoc.data();
            if (currentUser.suspended) {
                const msg = currentUser.suspensionReason || "Conta suspensa. Contate o suporte.";
                alert(`⚠️ CONTA SUSPENSA: ${msg}`);
                currentUser = null;
                return false;
            }
            renderApp();
            return true;
        }
        return false;
    }
    
    async function logout() {
        currentUser = null;
        renderApp();
    }
    
    async function placeBet(matchId, selection, oddsValue, stake) {
        if (!currentUser) return { ok: false, msg: "Faça login" };
        if (currentUser.suspended) return { ok: false, msg: "Conta suspensa" };
        const match = matches.find(m => m.id === matchId);
        if (!match || match.minute >= 90) return { ok: false, msg: "Partida encerrada" };
        if (stake <= 0) return { ok: false, msg: "Valor inválido" };
        if (currentUser.balance < stake) return { ok: false, msg: "Saldo insuficiente" };
        
        const newBalance = currentUser.balance - stake;
        await db.collection(USERS_COLL).doc(currentUser.username).update({ balance: newBalance });
        currentUser.balance = newBalance;
        await db.collection(BETS_COLL).add({
            username: currentUser.username,
            matchId, selection, stake, odds: oddsValue,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return { ok: true, msg: `Aposta de R$ ${stake.toFixed(2)} realizada!` };
    }
    
    // Renderização
    function renderApp() {
        const root = document.getElementById('root');
        if (!currentUser) {
            root.innerHTML = renderLoginRegister();
            attachLoginEvents();
        } else {
            root.innerHTML = renderDashboard();
            attachDashboardEvents();
            const stakeInput = document.getElementById('stakeAmount');
            if (stakeInput && !stakeInput.value) stakeInput.value = '25';
        }
        // Atualizar título
        document.title = `${siteConfig.name} - Apostas`;
    }
    
    function renderLoginRegister() {
        return `
            <div class="app-container">
                <div class="form-container">
                    <div class="form-card">
                        <h2 style="color:${siteConfig.primaryColor}">${siteConfig.logo} ${siteConfig.name}</h2>
                        <p style="color:#bbf5e4">Cadastro completo (CPF, Nome, Telefone)</p>
                        <div id="loginArea">
                            <input type="text" id="loginUser" placeholder="Nome de usuário">
                            <input type="password" id="loginPass" placeholder="Senha">
                            <button id="doLoginBtn">🔐 Entrar</button>
                            <div class="switch-link" id="showRegister">Não tenho conta → Cadastrar</div>
                            <div class="switch-link" id="goToAdmin" style="color:#ffaa66;">👑 Acesso Administrador</div>
                        </div>
                        <div id="registerArea" class="hidden">
                            <input type="text" id="regUsername" placeholder="Nome de usuário *">
                            <input type="text" id="regFullName" placeholder="Nome completo *">
                            <input type="text" id="regCpf" placeholder="CPF *">
                            <input type="tel" id="regPhone" placeholder="Telefone (WhatsApp) *">
                            <input type="password" id="regPass" placeholder="Senha *">
                            <button id="doRegisterBtn">📝 Cadastrar (+R$150 bônus)</button>
                            <div class="switch-link" id="showLogin">← Voltar ao login</div>
                        </div>
                        <div id="authMsg" style="margin-top:12px; color:#ffbc6e;"></div>
                    </div>
                </div>
                <div class="footer">Dados seguros em nuvem · Suporte 24h</div>
            </div>
        `;
    }
    
    function renderDashboard() {
        const isSuspended = currentUser.suspended;
        const alertMsg = currentUser.alertMessage;
        const matchesHtml = matches.map(m => {
            const isFinished = m.minute >= 90;
            return `
                <div class="match-card">
                    <div class="match-header"><span class="league">${m.league}</span><span class="live-badge">${isFinished ? "🏁 ENCERRADA" : `⚡ ${m.minute}'`}</span></div>
                    <div class="teams"><span>${m.home}</span><span class="score">${m.homeScore}:${m.awayScore}</span><span>${m.away}</span></div>
                    <div class="odds-row">
                        <button class="odd-btn" data-matchid="${m.id}" data-selection="home" data-odds="${m.odds.home}" ${isFinished || isSuspended ? 'disabled' : ''}>🏠 ${m.home}<br><strong>${m.odds.home.toFixed(2)}</strong></button>
                        <button class="odd-btn" data-matchid="${m.id}" data-selection="draw" data-odds="${m.odds.draw}" ${isFinished || isSuspended ? 'disabled' : ''}>🤝 Empate<br><strong>${m.odds.draw.toFixed(2)}</strong></button>
                        <button class="odd-btn" data-matchid="${m.id}" data-selection="away" data-odds="${m.odds.away}" ${isFinished || isSuspended ? 'disabled' : ''}>✈️ ${m.away}<br><strong>${m.odds.away.toFixed(2)}</strong></button>
                    </div>
                </div>
            `;
        }).join('');
        
        const historyItems = (currentUser.history || []).slice(0, 10).map(h => `
            <div class="history-item">📅 ${h.date} | ${h.match} | ${h.betPick} | R$ ${h.stake} | ${h.result} | ${h.profit >= 0 ? `+R$ ${h.profit.toFixed(2)}` : `-R$ ${(-h.profit).toFixed(2)}`}</div>
        `).join('');
        
        return `
            <div class="app-container">
                ${alertMsg ? `<div class="alert-message">📢 AVISO: ${alertMsg}</div>` : ''}
                ${isSuspended ? `<div class="suspended-banner">⛔ CONTA SUSPENSA: ${currentUser.suspensionReason || "Motivo não informado"} | Entre em contato com o suporte.</div>` : ''}
                <div class="header">
                    <div class="logo"><h1>${siteConfig.logo} ${siteConfig.name}</h1><span>apostas ao vivo</span></div>
                    <div class="user-area">
                        <span>👤 ${currentUser.fullName?.split(' ')[0] || currentUser.username}</span>
                        <span class="balance">💰 R$ ${currentUser.balance.toFixed(2)}</span>
                        <button class="btn-logout" id="logoutBtn">Sair</button>
                    </div>
                </div>
                <div class="dashboard">
                    <div class="section-title">📡 PARTIDAS AO VIVO</div>
                    ${matchesHtml}
                    <div class="bet-panel">
                        <div class="section-title">📌 MINHA APOSTA</div>
                        <div id="selectedInfo" class="selected-match">🔽 Clique numa odd acima</div>
                        <div class="bet-input">
                            <input type="number" id="stakeAmount" placeholder="Valor R$" step="5" min="5" ${isSuspended ? 'disabled' : ''}>
                            <button id="confirmBetBtn" class="place-bet" disabled ${isSuspended ? 'disabled' : ''}>✔️ Apostar</button>
                        </div>
                        <div id="betMessage" class="message"></div>
                        <div class="section-title">📜 HISTÓRICO</div>
                        <div class="history-list">${historyItems.length ? historyItems : '<div style="padding:8px;text-align:center;">Nenhuma aposta</div>'}</div>
                    </div>
                </div>
                <div class="footer">${siteConfig.name} · Suporte: (11) 99999-9999</div>
            </div>
        `;
    }
    
    function attachLoginEvents() {
        const loginDiv = document.getElementById('loginArea');
        const regDiv = document.getElementById('registerArea');
        const showRegister = document.getElementById('showRegister');
        const showLogin = document.getElementById('showLogin');
        const goToAdmin = document.getElementById('goToAdmin');
        const doLogin = document.getElementById('doLoginBtn');
        const doRegister = document.getElementById('doRegisterBtn');
        const authMsg = document.getElementById('authMsg');
        
        if (showRegister) showRegister.onclick = () => { loginDiv.classList.add('hidden'); regDiv.classList.remove('hidden'); };
        if (showLogin) showLogin.onclick = () => { regDiv.classList.add('hidden'); loginDiv.classList.remove('hidden'); };
        if (goToAdmin) goToAdmin.onclick = () => { window.location.href = 'admin.html'; };
        
        if (doLogin) {
            doLogin.onclick = async () => {
                const user = document.getElementById('loginUser').value.trim();
                const pass = document.getElementById('loginPass').value.trim();
                const ok = await login(user, pass);
                if (!ok) authMsg.innerText = 'Usuário/senha incorretos ou conta suspensa';
                else authMsg.innerText = '';
            };
        }
        if (doRegister) {
            doRegister.onclick = async () => {
                const username = document.getElementById('regUsername').value.trim();
                const fullName = document.getElementById('regFullName').value.trim();
                const cpf = document.getElementById('regCpf').value.trim();
                const phone = document.getElementById('regPhone').value.trim();
                const password = document.getElementById('regPass').value.trim();
                if (!username || !fullName || !cpf || !phone || !password) {
                    authMsg.innerText = 'Preencha todos os campos obrigatórios *';
                    return;
                }
                if (cpf.length < 11) { authMsg.innerText = 'CPF inválido (mínimo 11 dígitos)'; return; }
                const ok = await register({ username, password, fullName, cpf, phone });
                if (ok) {
                    authMsg.innerText = 'Cadastro realizado! Faça login.';
                    regDiv.classList.add('hidden');
                    loginDiv.classList.remove('hidden');
                } else {
                    authMsg.innerText = 'Usuário já existe';
                }
            };
        }
    }
    
    function attachDashboardEvents() {
        document.getElementById('logoutBtn')?.addEventListener('click', logout);
        const oddsBtns = document.querySelectorAll('.odd-btn:not([disabled])');
        oddsBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (currentUser.suspended) { alert("Conta suspensa"); return; }
                const matchId = parseInt(btn.dataset.matchid);
                const selection = btn.dataset.selection;
                const odds = parseFloat(btn.dataset.odds);
                const match = matches.find(m => m.id === matchId);
                if (!match || match.minute >= 90) { document.getElementById('betMessage').innerHTML = '<span style="color:#ffa098">Partida encerrada!</span>'; return; }
                let selName = selection === 'home' ? match.home : (selection === 'away' ? match.away : 'Empate');
                currentSelected = { matchId, selection, odds };
                document.getElementById('selectedInfo').innerHTML = `🎯 Aposta: ${match.home} x ${match.away} → ${selName} (odd ${odds.toFixed(2)})`;
                document.getElementById('confirmBetBtn').disabled = false;
            });
        });
        const confirmBtn = document.getElementById('confirmBetBtn');
        if (confirmBtn) {
            confirmBtn.onclick = async () => {
                if (!currentSelected) { document.getElementById('betMessage').innerHTML = '<span style="color:#ffa098">Selecione uma odd!</span>'; return; }
                const stake = parseFloat(document.getElementById('stakeAmount')?.value);
                if (isNaN(stake) || stake <= 0) { document.getElementById('betMessage').innerHTML = '<span style="color:#ffa098">Valor inválido</span>'; return; }
                const result = await placeBet(currentSelected.matchId, currentSelected.selection, currentSelected.odds, stake);
                if (result.ok) {
                    document.getElementById('betMessage').innerHTML = `<span style="color:#a0ffd0">✅ ${result.msg}</span>`;
                    currentSelected = null;
                    confirmBtn.disabled = true;
                    document.getElementById('selectedInfo').innerHTML = '🔽 Clique numa odd acima';
                    await refreshUserData();
                    renderApp();
                } else {
                    document.getElementById('betMessage').innerHTML = `<span style="color:#ffa098">❌ ${result.msg}</span>`;
                }
            };
        }
    }
    
    async function init() {
        await loadConfig();
        await initMatches();
        startLiveSimulation();
        renderApp();
    }
    init();
</script>
</body>
</html>
