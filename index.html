<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKB TELECOM | Windows 11 Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        :root {
            --win-bg: #1a1a1a;
            --win-accent: #0078d4;
            --win-card: rgba(32, 32, 32, 0.7);
            --win-text: #ffffff;
            --win-border: rgba(255, 255, 255, 0.1);
            --win-blur: blur(25px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
            background: #000;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 120, 212, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 120, 212, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--win-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Estilo Vidro (Acrylic) */
        .glass {
            background: var(--win-card);
            backdrop-filter: var(--win-blur);
            -webkit-backdrop-filter: var(--win-blur);
            border: 1px solid var(--win-border);
            border-radius: 12px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 120px;
            animation: winOpen 0.8s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 30%, var(--win-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Botões de Ação Principais */
        .action-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--win-border);
            color: white;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--win-accent);
            transform: translateY(-2px);
        }

        /* Iframe Areas */
        .window-frame {
            display: none;
            margin-bottom: 40px;
            overflow: hidden;
            animation: winOpen 0.5s ease;
        }

        iframe {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 12px;
        }

        /* Grids */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .card {
            padding: 30px 24px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: scale(1.03);
            background: rgba(45, 45, 45, 0.8);
            border-color: var(--win-accent);
        }

        .card i {
            font-size: 2.5rem;
            color: var(--win-accent);
            margin-bottom: 15px;
        }

        .btn-buy {
            background: var(--win-accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Notícias */
        .news-item {
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--win-accent);
        }

        /* Info Empresa */
        .company-info {
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0.8;
        }

        /* Taskbar Estilo Windows 11 */
        .taskbar {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            display: flex;
            gap: 20px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .taskbar i {
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--win-accent);
            transition: 0.2s;
        }

        .taskbar i:hover { transform: translateY(-5px); }

        @keyframes winOpen {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        h2 { margin-bottom: 25px; font-weight: 600; display: flex; align-items: center; gap: 10px; }

        @media (max-width: 600px) {
            .logo { font-size: 2rem; }
            .action-bar { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo" id="logoText">WKB TELECOM</div>
        <div style="color: var(--win-accent); margin-top: 10px;">
            <i class="fas fa-bolt"></i> <span id="velocidadeDestaque">1 Gbps</span>
        </div>
        <h1 id="slogan" style="margin-top: 20px; font-size: 1.5rem;">Internet de Verdade</h1>
        <p id="descricaoSlogan" style="opacity: 0.7; max-width: 600px; margin: 10px auto;">Fibra óptica de alta velocidade e segurança eletrônica avançada.</p>
    </header>

    <div class="action-bar">
        <button class="btn-action" onclick="toggleArea('centralArea')"><i class="fas fa-user-circle"></i> Central</button>
        <button class="btn-action" onclick="document.getElementById('planosSection').scrollIntoView({behavior:'smooth'})"><i class="fas fa-wifi"></i> Planos</button>
        <button class="btn-action" onclick="abrirSuporte()"><i class="fab fa-whatsapp"></i> Suporte</button>
        <button class="btn-action" onclick="toggleArea('speedTestArea')"><i class="fas fa-tachometer-alt"></i> SpeedTest</button>
        <button class="btn-action" id="btnAdminLogin"><i class="fas fa-lock"></i> Admin</button>
    </div>

    <div id="centralArea" class="window-frame glass"><iframe src="https://wkbtelecom.centralassinante.com.br/#/login"></iframe></div>
    <div id="speedTestArea" class="window-frame glass"><iframe src="https://openspeedtest.com/Get-speedtest.php"></iframe></div>

    <h2 id="planosSection"><i class="fas fa-signal"></i> Planos de Fibra</h2>
    <div class="grid" id="planosGrid"></div>

    <h2><i class="fas fa-shield-alt"></i> Segurança Eletrônica</h2>
    <div class="grid" id="securityGrid"></div>

    <h2><i class="fas fa-newspaper"></i> Últimas Notícias</h2>
    <div id="newsList"></div>

    <div id="companyInfo" class="company-info glass" style="margin-top: 50px;"></div>

    <footer style="text-align: center; margin-top: 40px; opacity: 0.5; font-size: 0.8rem;">
        <p>© 2025 WKB TELECOM - Belterra/PA</p>
    </footer>
</div>

<div class="taskbar glass">
    <i class="fas fa-home" title="Início" onclick="window.scrollTo({top:0, behavior:'smooth'})"></i>
    <i class="fab fa-whatsapp" title="WhatsApp Suporte" onclick="abrirSuporte()"></i>
    <i class="fas fa-user" title="Área do Cliente" onclick="toggleArea('centralArea')"></i>
</div>

<script>
    // Configuração Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDV10JNJNCz7AwEQ12Ji4ASa67i18iRUfg",
        authDomain: "total-sistemas-a2b2f.firebaseapp.com",
        databaseURL: "https://total-sistemas-a2b2f-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const rootRef = db.ref("wkb_telecom");

    // Alternar visualização de áreas (Central/Speedtest)
    function toggleArea(id) {
        const area = document.getElementById(id);
        const isVisible = area.style.display === "block";
        document.querySelectorAll('.window-frame').forEach(a => a.style.display = 'none');
        area.style.display = isVisible ? "none" : "block";
        if(!isVisible) area.scrollIntoView({behavior: 'smooth'});
    }

    async function abrirSuporte() {
        const snap = await rootRef.child("config/whatsapp").once("value");
        const whats = snap.val() || "559392282874";
        window.open(`https://wa.me/${whats}`, "_blank");
    }

    // Renderização
    function atualizarTela(data) {
        // Configurações base
        const cfg = data.config || {};
        document.getElementById("logoText").innerText = cfg.logoNome || "WKB TELECOM";
        document.getElementById("slogan").innerText = cfg.slogan || "Internet de Verdade";
        document.getElementById("descricaoSlogan").innerText = cfg.descricaoSlogan || "";
        document.getElementById("velocidadeDestaque").innerText = cfg.velocidadeDestaque || "1 Gbps";

        // Planos
        const planosGrid = document.getElementById("planosGrid");
        planosGrid.innerHTML = "";
        (data.planos || []).forEach(p => {
            planosGrid.innerHTML += `
                <div class="card glass">
                    <i class="fas ${p.icone || 'fa-wifi'}"></i>
                    <h3>${p.nome}</h3>
                    <p style="font-size: 1.5rem; margin: 10px 0;">R$ ${p.preco},00</p>
                    <p style="opacity:0.7">${p.desc}</p>
                    <button class="btn-buy" onclick="alert('Iniciando contratação: ${p.nome}')">Assinar</button>
                </div>
            `;
        });

        // Segurança
        const securityGrid = document.getElementById("securityGrid");
        securityGrid.innerHTML = "";
        (data.servicosSeguranca || []).forEach(s => {
            securityGrid.innerHTML += `
                <div class="card glass">
                    <i class="fas ${s.icone}"></i>
                    <h3>${s.nome}</h3>
                    <p style="opacity:0.7; margin-top:10px;">${s.desc}</p>
                    <button class="btn-buy" style="background:transparent; border: 1px solid var(--win-accent)" onclick="alert('Solicitando orçamento para: ${s.nome}')">Orçamento</button>
                </div>
            `;
        });

        // Notícias
        const newsList = document.getElementById("newsList");
        newsList.innerHTML = "";
        (data.noticias || []).forEach(n => {
            newsList.innerHTML += `
                <div class="news-item glass">
                    <h4 style="color: var(--win-accent)">${n.titulo}</h4>
                    <small style="opacity:0.5">${n.data}</small>
                    <p style="margin-top:10px">${n.texto}</p>
                </div>
            `;
        });

        document.getElementById("companyInfo").innerHTML = data.empresaInfo || "";
    }

    // Login Admin (Abre a mesma janela que você tinha)
    document.getElementById("btnAdminLogin").onclick = () => {
        const senha = prompt("Digite a senha de administrador:");
        rootRef.child("admin/senha").once("value", snap => {
            if(senha === (snap.val() || "admin123")) {
                // Aqui você pode inserir o código do painel que mandei anteriormente ou abrir nova aba
                alert("Acesso autorizado. Carregando Painel...");
                window.open("about:blank").document.write("<h1>Área Administrativa em construção...</h1>");
            } else {
                alert("Senha incorreta.");
            }
        });
    };

    // Firebase Listeners
    rootRef.on("value", snap => { if(snap.exists()) atualizarTela(snap.val()); });
</script>
</body>
</html>
