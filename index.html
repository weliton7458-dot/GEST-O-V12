<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title id="page-title">TOTAL GESTÃO V12 - Mobile</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            padding: 16px;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.18);
            padding: 20px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        h1, h2, h3 { font-weight: 600; letter-spacing: -0.3px; }
        h2 { border-left: 4px solid #ffcc00; padding-left: 14px; margin-bottom: 20px; font-size: 1.4rem; }
        input, select, textarea, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: rgba(255,255,255,0.1);
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: #ffcc00; color: #000; border: none; }
        .btn-secondary { background: #007bff; color: #fff; }
        .btn-danger { background: #d32f2f; color: #fff; }
        .btn-warning { background: #ff8800; color: #000; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 15px 0;
        }
        .filtros-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
            justify-content: center;
        }
        .filtro-btn {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 0.8rem;
            text-align: center;
            cursor: pointer;
        }
        .filtro-btn.ativo { background: #ffcc00; color: #000; }
        .os-card {
            background: rgba(255,255,255,0.05);
            border-left: 5px solid #ffcc00;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .badge {
            float: right;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .status-Aguardando { background: #ff8800; color:#000; }
        .status-Andamento { background: #007bff; animation: pulse 1.2s infinite; }
        .status-Concluído { background: #00cc00; color:#000; }
        .status-Cancelado { background: #dc3545; color:#fff; }
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; background: #0088ff; transform: scale(1.02); }
            100% { opacity: 0.8; }
        }
        .info-box { background: rgba(0,0,0,0.4); border-radius: 16px; padding: 16px; margin: 12px 0; }
        .aux-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin: 10px 0;
        }
        .aux-card {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .aux-card.selected {
            background: #ffcc00;
            color: #000;
            border: 2px solid #fff;
        }
        .aux-card img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 5px;
        }
        .chat-container {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 12px;
        }
        .chat-message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 12px;
        }
        .chat-message.own {
            flex-direction: row-reverse;
        }
        .chat-message.own .chat-bubble {
            background: #ffcc00;
            color: #000;
            border-radius: 18px 4px 18px 18px;
        }
        .chat-message.own .chat-bubble strong { color: #000; }
        .chat-message:not(.own) .chat-bubble {
            background: rgba(255,255,255,0.1);
            border-radius: 4px 18px 18px 18px;
        }
        .chat-bubble {
            max-width: 75%;
            padding: 8px 12px;
        }
        .chat-bubble strong { color: #ffcc00; }
        .chat-bubble small { font-size: 10px; opacity: 0.7; display: block; margin-top: 4px; }
        .alert-message {
            background: #ffcc00;
            color: #000;
            border-radius: 18px;
            padding: 8px 12px;
            margin: 8px 0;
            text-align: center;
            font-weight: bold;
        }
        .online-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background-color: #00cc00; box-shadow: 0 0 5px #00cc00; }
        .offline { background-color: #888; }
        .status-bar {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 8px 12px;
            margin: 10px 0;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .status-item { display: flex; align-items: center; gap: 6px; }
        .profile-img { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ffcc00; object-fit: cover; margin-bottom: 8px; }
        .equipe-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .equipe-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            width: calc(50% - 5px);
        }
        .equipe-card img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }
        .equipe-card .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: auto;
        }
        .disponivel { background: #00cc00; }
        .ocupado { background: #ff8800; }
        footer { font-size: 10px; text-align: center; margin-top: 20px; opacity: 0.7; }
        .button-with-badge { position: relative; display: inline-block; width: 100%; }
        .button-with-badge .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
        }
        .search-box {
            display: flex;
            gap: 8px;
            margin: 10px 0;
        }
        .search-box input { flex: 1; margin: 0; }
        .search-box button { width: auto; margin: 0; }
        @media (max-width: 550px) {
            .equipe-card { width: 100%; }
        }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="login-screen" class="container">
    <center>
        <div id="login-logo-area"></div>
        <h1 id="login-company-name" style="color:#ffcc00;">TOTAL GESTÃO</h1>
    </center>
    <input type="text" id="user" placeholder="Usuário" autocomplete="off">
    <input type="password" id="pass" placeholder="Senha">
    <button class="btn-primary" id="btn-login">Entrar</button>
    <footer>Contate o administrador para recuperação de conta</footer>
</div>

<!-- TELA PRINCIPAL (MENU) -->
<div id="menu-screen" class="container hidden">
    <center>
        <div id="user-photo-menu"></div>
        <h3 id="welcome-menu" style="color:#ffcc00;"></h3>
        <div id="clock-menu" class="status-bar"></div>
        <div id="network-info" class="status-bar">
            <div class="status-item"><i class="fas fa-tachometer-alt"></i> Ping: <span id="ping-value">--</span> ms</div>
            <div class="status-item"><i class="fas fa-globe"></i> Operadora: <span id="isp-value">--</span></div>
            <div class="status-item"><i class="fas fa-network-wired"></i> IP: <span id="ip-value">--</span></div>
            <div class="status-item"><i class="fas fa-signal"></i> Rede: <span id="connection-type">--</span></div>
        </div>
        <div id="online-menu" class="status-bar"><i class="fas fa-circle online"></i> Online: <span id="online-count">0</span></div>
        <div style="margin-top: 10px; display: flex; gap: 10px; justify-content: center;">
            <button class="btn-secondary" style="width:auto; padding:6px 16px;" id="btn-perfil-mobile">Perfil</button>
            <button class="btn-secondary" style="width:auto; padding:6px 16px;" id="btn-chat-mobile">Chat <span id="chat-notif-badge" style="display:none;" class="chat-badge">!</span></button>
            <button class="btn-secondary" style="width:auto; padding:6px 16px;" id="btn-equipe-mobile">Equipe</button>
            <button class="btn-secondary" style="width:auto; padding:6px 16px;" id="btn-acessos-mobile">Acessos</button>
        </div>
    </center>
    <hr style="margin: 16px 0; border-color: rgba(255,255,255,0.1);">
    <div id="admin-only-mobile" class="hidden">
        <button class="btn-secondary" id="btn-config-mobile">Configurar Sistema</button>
        <button class="btn-warning" id="btn-alerta-mobile">Enviar Alerta</button>
        <button class="btn-secondary" id="btn-relatorio-concluidas">Imprimir Relatórios Concluídos</button>
        <div class="search-box">
            <input type="text" id="pesquisa-conta" placeholder="Buscar OS Concluída por Conta...">
            <button id="btn-buscar-conta" class="btn-primary"><i class="fas fa-search"></i></button>
        </div>
        <div id="resultado-busca"></div>
    </div>
    <div id="admin-base-mobile" class="hidden">
        <div class="menu-grid">
            <button class="btn-primary" id="btn-nova-os-mobile">Nova OS</button>
            <button class="btn-secondary" id="btn-gerenciar-mobile">Gerenciar Equipe</button>
            <button id="btn-relatorio-mobile">Relatório Geral PDF</button>
            <button id="btn-historico-mobile">PDF Histórico</button>
        </div>
    </div>
    <div class="menu-grid">
        <div class="button-with-badge" style="width:100%;">
            <button id="btn-ver-os-mobile">Ver OS</button>
            <span id="os-abertas-badge" class="badge-count" style="display:none;">0</span>
        </div>
        <button class="btn-danger" id="btn-sair-mobile">Sair</button>
    </div>
    <div id="os-count-info" class="status-bar" style="justify-content: center;">
        <i class="fas fa-clipboard-list"></i> OS Abertas: <span id="total-os-abertas">0</span>
    </div>
</div>

<!-- TELA DE EQUIPE -->
<div id="equipe-screen" class="container hidden">
    <h2><i class="fas fa-users"></i> Equipe em Tempo Real</h2>
    <div id="equipe-list" class="equipe-grid"></div>
    <button class="btn-secondary" id="voltar-equipe">Voltar</button>
</div>

<!-- TELA DE ACESSOS -->
<div id="acessos-screen" class="container hidden">
    <h2><i class="fas fa-history"></i> Histórico de Acessos</h2>
    <div id="logs-list" class="chat-container" style="max-height: 500px;"></div>
    <button class="btn-secondary" id="voltar-acessos">Voltar</button>
</div>

<!-- TELA DE ENVIO DE ALERTA (admin) -->
<div id="alerta-screen" class="container hidden">
    <h2><i class="fas fa-bullhorn"></i> Enviar Alerta para Todos</h2>
    <textarea id="alerta-texto" rows="3" placeholder="Digite a mensagem de alerta..."></textarea>
    <button class="btn-primary" id="btn-enviar-alerta">Enviar Alerta</button>
    <button class="btn-secondary" id="voltar-alerta">Voltar</button>
</div>

<!-- DEMAIS TELAS -->
<div id="list-screen" class="container hidden"></div>
<div id="chat-screen" class="container hidden"></div>
<div id="profile-screen" class="container hidden"></div>
<div id="manage-users-screen" class="container hidden"></div>
<div id="config-branding-screen" class="container hidden"></div>
<div id="add-os-screen" class="container hidden"></div>
<div id="details-screen" class="container hidden"></div>

<div id="pdf-area" style="display:none"></div>

<script>
    // ---------- FIREBASE ----------
    const firebaseConfig = {
        apiKey: "AIzaSyDV10JNJNCz7AwEQ12Ji4ASa67i18iRUfg",
        authDomain: "total-sistemas-a2b2f.firebaseapp.com",
        databaseURL: "https://total-sistemas-a2b2f-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref();

    let db = { config: { name: "TOTAL MONITORAMENTO", logo: "", emailDestino: "", emailjs: {} }, users: [], os: [], logs: [] };
    let session = null;
    let currentOSId = null;
    let tempSystemLogo = "";
    let dataLoaded = false;
    let currentFiltro = "abertas";
    let presenceRef = null;
    let lastMessageTimestamp = 0;

    // ---------- FUNÇÕES DE REDE ----------
    async function obterInfoRede() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('ip-value').innerText = data.ip || '--';
            document.getElementById('isp-value').innerText = data.org ? data.org.split(' ')[0] : (data.asn ? data.asn : '--');
            return data.ip || 'desconhecido';
        } catch(e) {
            document.getElementById('ip-value').innerText = 'erro';
            document.getElementById('isp-value').innerText = 'erro';
            return 'erro';
        }
    }
    function obterTipoConexao() {
        if ('connection' in navigator) {
            const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (conn) {
                let tipo = conn.effectiveType || conn.type;
                if (tipo === 'wifi') tipo = 'Wi-Fi';
                else if (tipo === 'cellular') tipo = 'Rede Móvel';
                else if (tipo === 'ethernet') tipo = 'Cabo';
                else if (tipo === 'none') tipo = 'Sem conexão';
                document.getElementById('connection-type').innerText = tipo || 'desconhecido';
            } else document.getElementById('connection-type').innerText = 'n/d';
        } else document.getElementById('connection-type').innerText = 'n/d';
    }
    
    // NOVO PING para DNS do Google (8.8.8.8) via fetch
    async function medirPing() {
        const start = performance.now();
        try {
            await fetch('https://dns.google/resolve?name=google.com&type=A', { mode: 'no-cors' });
            const end = performance.now();
            const ping = Math.round(end - start);
            document.getElementById('ping-value').innerText = ping;
        } catch(e) {
            document.getElementById('ping-value').innerText = 'erro';
        }
    }
    setInterval(medirPing, 15000);
    medirPing();

    // ---------- CONTAGEM DE OS ABERTAS ----------
    function atualizarContadorOS() {
        if(!db.os) return;
        const abertas = db.os.filter(o => o.status !== 'Concluído' && o.status !== 'Cancelado').length;
        document.getElementById('total-os-abertas').innerText = abertas;
        const badge = document.getElementById('os-abertas-badge');
        if(abertas > 0) {
            badge.style.display = 'inline-block';
            badge.innerText = abertas;
        } else {
            badge.style.display = 'none';
        }
    }

    // ---------- STATUS DISPONÍVEL/OCUPADO ----------
    async function atualizarStatusUsuario(usuarioNome, status) {
        await dbRef.child('usuarios_status/' + usuarioNome).set({ status: status, timestamp: Date.now() });
    }
    function calcularStatusOcupado(usuarioNome) {
        const osAtivas = db.os.filter(o => o.status !== 'Concluído' && o.status !== 'Cancelado');
        for (let os of osAtivas) {
            if (os.auxiliares && os.auxiliares.includes(usuarioNome)) {
                return true;
            }
        }
        return false;
    }
    function atualizarStatusBaseadoEmOS() {
        if (!db.os) return;
        for (let user of db.users) {
            const ocupado = calcularStatusOcupado(user.exibe || user.nome);
            const novoStatus = ocupado ? 'ocupado' : 'disponivel';
            atualizarStatusUsuario(user.nome, novoStatus);
        }
    }
    function recalcStatusAposOS() {
        atualizarStatusBaseadoEmOS();
    }

    // ---------- PRESENÇA ONLINE ----------
    function setupPresence() {
        const userStatusRef = dbRef.child('status/' + session.nome);
        const connectedRef = firebase.database().ref('.info/connected');
        connectedRef.on('value', (snap) => {
            if(snap.val() === true) {
                presenceRef = userStatusRef;
                userStatusRef.onDisconnect().remove();
                userStatusRef.set({ online: true, nome: session.exibe || session.nome, lastSeen: Date.now() });
                atualizarStatusUsuario(session.nome, 'disponivel');
            }
        });
        dbRef.child('status').on('value', (snap) => {
            let count = 0;
            snap.forEach(child => { if(child.val().online) count++; });
            document.getElementById('online-count').innerText = count;
        });
    }

    // ---------- LISTA DE EQUIPE (CORRIGIDA - USANDO LISTENERS) ----------
    let equipeListenerAttached = false;
    function carregarEquipe() {
        const container = document.getElementById('equipe-screen');
        container.innerHTML = `
            <h2><i class="fas fa-users"></i> Equipe em Tempo Real</h2>
            <div id="equipe-list" class="equipe-grid"></div>
            <button class="btn-secondary" id="voltar-equipe">Voltar</button>
        `;
        document.getElementById('voltar-equipe').onclick = () => {
            document.getElementById('menu-screen').classList.remove('hidden');
            showScreen('');
        };
        
        function renderEquipe() {
            const listDiv = document.getElementById('equipe-list');
            if(!listDiv) return;
            listDiv.innerHTML = '';
            db.users.forEach(user => {
                if(user.nome === 'admin' || user.nome === 'irlan' || user.nome === 'mike') return;
                // Buscar status de trabalho e online
                dbRef.child('usuarios_status/' + user.nome).once('value', snapStatus => {
                    const statusTrab = snapStatus.val()?.status || 'disponivel';
                    dbRef.child('status/' + user.nome).once('value', snapOnline => {
                        const isOnline = snapOnline.val()?.online || false;
                        const foto = user.foto || 'https://via.placeholder.com/40';
                        listDiv.innerHTML += `
                            <div class="equipe-card">
                                <img src="${foto}" onerror="this.src='https://via.placeholder.com/40'">
                                <div><strong>${user.exibe || user.nome}</strong><br><span style="font-size:10px;">${user.role}</span></div>
                                <div class="status-dot ${statusTrab === 'disponivel' ? 'disponivel' : 'ocupado'}" title="${statusTrab === 'disponivel' ? 'Disponível' : 'Ocupado'}"></div>
                                <div><span class="online-indicator ${isOnline ? 'online' : 'offline'}"></span></div>
                            </div>
                        `;
                    });
                });
            });
        }
        
        // Atualiza sempre que houver mudança nos status
        if(!equipeListenerAttached) {
            dbRef.child('usuarios_status').on('value', () => renderEquipe());
            dbRef.child('status').on('value', () => renderEquipe());
            dbRef.child('users').on('value', () => renderEquipe());
            equipeListenerAttached = true;
        }
        renderEquipe();
        showScreen('equipe-screen');
    }

    // ---------- LOG DE ACESSOS ----------
    async function registrarAcesso(usuario) {
        const ip = await obterInfoRede();
        const logEntry = {
            usuario: usuario.nome,
            exibe: usuario.exibe || usuario.nome,
            hora: new Date().toLocaleString(),
            timestamp: Date.now(),
            ip: ip
        };
        dbRef.child('logs').push(logEntry);
    }
    function carregarLogs() {
        const logsDiv = document.getElementById('logs-list');
        if(!logsDiv) return;
        dbRef.child('logs').orderByChild('timestamp').once('value', snap => {
            logsDiv.innerHTML = '';
            const logs = [];
            snap.forEach(child => logs.push(child.val()));
            logs.reverse().forEach(log => {
                logsDiv.innerHTML += `<div class="log-item"><strong>${log.exibe}</strong> (${log.usuario})<br>📅 ${log.hora}<br>🌐 IP: ${log.ip || 'n/d'}</div>`;
            });
            if(logs.length === 0) logsDiv.innerHTML = '<div class="info-box">Nenhum acesso registrado ainda.</div>';
        });
    }

    // ---------- ALERTAS (admin) ----------
    function carregarAlerta() {
        const container = document.getElementById('alerta-screen');
        container.innerHTML = `
            <h2><i class="fas fa-bullhorn"></i> Enviar Alerta para Todos</h2>
            <textarea id="alerta-texto" rows="3" placeholder="Digite a mensagem de alerta..."></textarea>
            <button class="btn-primary" id="btn-enviar-alerta">Enviar Alerta</button>
            <button class="btn-secondary" id="voltar-alerta">Voltar</button>
        `;
        document.getElementById('btn-enviar-alerta').onclick = () => {
            const texto = document.getElementById('alerta-texto').value.trim();
            if(!texto) return alert("Digite uma mensagem");
            const alerta = {
                texto: texto,
                usuario: session.exibe || session.nome.toUpperCase(),
                hora: new Date().toLocaleString(),
                timestamp: Date.now()
            };
            dbRef.child('alertas').push(alerta);
            alert("Alerta enviado!");
            document.getElementById('alerta-texto').value = '';
            document.getElementById('menu-screen').classList.remove('hidden');
            showScreen('');
        };
        document.getElementById('voltar-alerta').onclick = () => {
            document.getElementById('menu-screen').classList.remove('hidden');
            showScreen('');
        };
        showScreen('alerta-screen');
    }
    function setupAlertasListener() {
        dbRef.child('alertas').limitToLast(5).on('child_added', (snap) => {
            const alerta = snap.val();
            if (Notification.permission === 'granted') {
                new Notification(`📢 Alerta de ${alerta.usuario}`, { body: alerta.texto });
            }
            const chatDiv = document.getElementById('chat-messages');
            if(chatDiv && !document.getElementById('chat-screen').classList.contains('hidden')) {
                const div = document.createElement('div');

    // ---------- NOTIFICAÇÕES DE MENSAGEM ----------
    function solicitarPermissaoNotificacao() {
        if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
            Notification.requestPermission();
        }
    }
    function mostrarNotificacao(usuario, texto) {
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(`Nova mensagem de ${usuario}`, { body: texto.substring(0, 100) });
        }
        const badge = document.getElementById('chat-notif-badge');
        if(badge) badge.style.display = 'inline-block';
    }

    // ---------- CHAT SEM FOTOS ----------
    function setupChatListener() {
        dbRef.child('chat').limitToLast(50).on('child_added', (snap) => {
            const msg = snap.val();
            const chatDiv = document.getElementById('chat-messages');
            if(chatDiv && !document.getElementById('chat-screen').classList.contains('hidden')) {
                const isOwn = (msg.usuario === (session.exibe || session.nome).toUpperCase());
                const div = document.createElement('div');
                div.className = `chat-message ${isOwn ? 'own' : ''}`;
                div.innerHTML = `
                    <div class="chat-bubble">
                        <strong>${msg.usuario}</strong> <small>${msg.hora}</small><br>${msg.texto}
                    </div>
                `;
                chatDiv.appendChild(div);
                div.scrollIntoView({ behavior: 'smooth', block: 'end' });
            } else if(msg.usuario !== (session?.exibe || session?.nome?.toUpperCase()) && msg.timestamp > lastMessageTimestamp) {
                mostrarNotificacao(msg.usuario, msg.texto);
            }
            lastMessageTimestamp = Date.now();
        });
    }
    function enviarMensagem() {
        const input = document.getElementById('chat-input');
        const texto = input.value.trim();
        if(!texto) return;
        const msg = { usuario: session.exibe || session.nome.toUpperCase(), texto: texto, hora: new Date().toLocaleTimeString(), timestamp: Date.now() };
        dbRef.child('chat').push(msg);
        input.value = '';
        document.getElementById('chat-notif-badge').style.display = 'none';
    }

        dbRef.child('chat').limitToLast(50).once('value', snap => {

    function loadFirebaseData() {

            loadedCount++;
            if (loadedCount === 3) {
                dataLoaded = true;
                applyBranding();
                verificarSessao();
            }

        dbRef.child('config').on('value', snap => { if(snap.exists()) db.config = snap.val(); checkReady(); });
        dbRef.child('users').on('value', snap => { if(snap.exists()) db.users = snap.val(); else initDefaultUsers(); checkReady(); });
        dbRef.child('os').on('value', snap => { 
            if(snap.exists()) db.os = snap.val(); 
            else db.os = [];

            recalcStatusAposOS();
            checkReady();

            const user = db.users.find(u => u.nome === nome && u.pass === senha);

        const p = document.getElementById('pass').value;

    function aplicarFiltroDinamico(filtro) {
        let lista = [];
        if(filtro === 'abertas') lista = db.os.filter(o => o.status !== 'Concluído' && o.status !== 'Cancelado');
        else if(filtro === 'concluidas') lista = db.os.filter(o => o.status === 'Concluído');
        else if(filtro === 'todas') lista = [...db.os];
        else if(filtro === 'nao-finalizadas') lista = db.os.filter(o => o.status !== 'Concluído');
        
        const ordem = { 'Andamento': 1, 'Aguardando': 2, 'Cancelado': 3, 'Concluído': 4 };
        lista.sort((a,b) => (ordem[a.status] || 99) - (ordem[b.status] || 99));
        
        document.getElementById('resumo-filtro').innerHTML = `<i class="fas fa-chart-line"></i> Quantidade: ${lista.length}`;
        const grid = document.getElementById('os-grid-container');
        grid.innerHTML = "";
        if(lista.length === 0) { grid.innerHTML = "<div class='info-box'>Nenhuma OS encontrada.</div>"; return; }
        lista.forEach(o => {
            let badgeContent = '';
            if(o.status === 'Andamento') badgeContent = '<i class="fas fa-spinner fa-spin"></i> ANDAMENTO';
            else if(o.status === 'Cancelado') badgeContent = '<i class="fas fa-ban"></i> CANCELADO';
            else badgeContent = o.status.toUpperCase();
            grid.innerHTML += `
                <div class="os-card" onclick="verDetalhes(${o.id})">
                    <span class="badge status-${o.status}">${badgeContent}</span>
                    <b><i class="fas fa-hashtag"></i> ${o.conta}</b> - ${o.empresa}<br>
                    <small><i class="fas fa-calendar-day"></i> ${o.dataAbertura} | ${o.abertoPor.toUpperCase()}</small>
                    ${o.cidade ? `<div><i class="fas fa-city"></i> ${o.cidade}</div>` : ''}
                </div>
            `;
        });
    }

            const usuariosTec = db.users.filter(u => u.role === 'tecnico' || u.role === 'auxiliar');
            usuariosTec.forEach(u => {
                const isSelected = o.auxiliares && o.auxiliares.includes(u.exibe || u.nome);
                const foto = u.foto || 'https://via.placeholder.com/50';
                auxDiv.innerHTML += `
                    <div class="aux-card ${isSelected ? 'selected' : ''}" data-nome="${u.exibe || u.nome}">
                        <img src="${foto}" onerror="this.src='https://via.placeholder.com/50'">
                        <div>${u.exibe || u.nome}</div>
                    </div>
                `;
            });
            document.querySelectorAll('.aux-card').forEach(card => {
                card.addEventListener('click', () => {
                    card.classList.toggle('selected');
                });
            });
            document.getElementById('tec-obs').value = o.resolucao || '';
            document.getElementById('tec-materiais').value = o.materiaisTec || '';
            document.getElementById('tec-status').value = o.status;
            
            const statusSelect = document.getElementById('tec-status');
            const divData = document.getElementById('campo-data-servico');
            const dataInput = document.getElementById('data-servico');
            if(o.dataServico) dataInput.value = o.dataServico;
            
            const toggleDataField = () => {
                if(statusSelect.value === 'Cancelado') divData.style.display = 'block';
                else divData.style.display = 'none';
            };
            statusSelect.onchange = toggleDataField;
            toggleDataField();
        }
        
        showScreen('details-screen');
    }

    async function atualizarOS() {
        const o = db.os.find(x => x.id === currentOSId);
        if(!o || o.status === 'Concluído') { alert("OS concluída não pode ser editada."); return; }
        const novoStatus = document.getElementById('tec-status').value;
        const statusAnterior = o.status;
        o.resolucao = document.getElementById('tec-obs').value;
        o.materiaisTec = document.getElementById('tec-materiais').value;
        
        const novosAuxiliares = [];
        document.querySelectorAll('.aux-card.selected').forEach(card => {
            novosAuxiliares.push(card.getAttribute('data-nome'));
        });
        o.auxiliares = novosAuxiliares;
        o.tecnicoExec = session.exibe || session.nome.toUpperCase();
        
        if(novoStatus === 'Cancelado' && (session.role === 'base' || session.role === 'admin' || session.nome === 'admin' || session.nome === 'mike')) {
            const dataServico = document.getElementById('data-servico').value;
            if(dataServico) o.dataServico = dataServico;
        }
        
        const agora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        if(novoStatus === 'Andamento' && o.status !== 'Andamento') o.horaInicio = agora;
        if(novoStatus === 'Concluído') {
            o.horaFim = agora;
            if(!o.horaInicio) o.horaInicio = o.horaAbertura;
        }
        o.status = novoStatus;
        saveToFirebase('os', db.os);
        await recalcStatusAposOS();
        alert("OS atualizada!");
        if(novoStatus === 'Concluído' && statusAnterior !== 'Concluído') await enviarEmailOSConcluida(o);
        carregarLista(currentFiltro);
    }

    async function enviarEmailOSConcluida(os) {
        const emailDestino = db.config.emailDestino;
        if(!emailDestino) return;
        const cfg = db.config.emailjs;
        if(!cfg || !cfg.service || !cfg.template || !cfg.publicKey) return;
        emailjs.init(cfg.publicKey);
        const templateParams = {
            to_email: emailDestino,
            subject: `OS Concluída - ${os.conta} - ${os.empresa}`,
            message: `OS Concluída\nConta: ${os.conta}\nEmpresa: ${os.empresa}\nTécnico: ${os.tecnicoExec}\nRelatório: ${os.resolucao}\nMateriais: ${os.materiaisTec}\nPeríodo: ${os.horaInicio} → ${os.horaFim}`
        };
        try { await emailjs.send(cfg.service, cfg.template, templateParams); } catch(e) { console.warn(e); }
    }

    // ---------- PERFIL ----------
    function carregarPerfil() {
        const container = document.getElementById('profile-screen');
        container.innerHTML = `
            <h2>Meu Perfil</h2>
            <div class="info-box">
                <label class="label-os">Foto de Perfil</label>
                <center><img id="preview-foto" src="${session.foto || 'https://via.placeholder.com/100'}" style="width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:10px;"></center>
                <input type="file" id="upload-foto" accept="image/*">
                <button class="btn-secondary" id="btn-upload-foto">Atualizar Foto</button>
            </div>
            <div class="info-box">
                <label class="label-os">Alterar nome</label>
                <input type="text" id="edit-nome" placeholder="Novo nome">
                <button class="btn-primary" id="btn-alterar-nome">Atualizar</button>
            </div>
            <div class="info-box">
                <label class="label-os">Alterar senha</label>
                <input type="password" id="edit-senha-atual" placeholder="Senha atual">
                <input type="password" id="edit-senha-nova" placeholder="Nova senha">
                <input type="password" id="edit-senha-confirma" placeholder="Confirmar">
                <button class="btn-primary" id="btn-alterar-senha">Alterar Senha</button>
            </div>
            <div id="profile-create-user" class="info-box" style="${(session.role === 'admin' || session.nome === 'admin' || session.nome === 'irlan' || session.nome === 'mike') ? 'display:block;' : 'display:none;'}">
                <label class="label-os">Criar novo usuário</label>
                <input type="text" id="novo-user-nome" placeholder="Nome">
                <select id="novo-user-role">
                    <option value="operador">Operador</option>
                    <option value="tecnico">Técnico</option>
                    <option value="auxiliar">Auxiliar</option>
                    <option value="base">Base</option>
                </select>
                <button class="btn-secondary" id="btn-criar-user">Criar</button>
                <small>Senha padrão: 123456</small>
            </div>
            <button class="btn-secondary" id="voltar-perfil">Voltar</button>
        `;
        document.getElementById('btn-upload-foto').onclick = () => {
            const fileInput = document.getElementById('upload-foto');
            const file = fileInput.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    session.foto = e.target.result;
                    const idx = db.users.findIndex(u => u.nome === session.nome);
                    if(idx !== -1) db.users[idx].foto = e.target.result;
                    saveToFirebase('users', db.users);
                    document.getElementById('preview-foto').src = e.target.result;
                    document.getElementById('user-photo-menu').innerHTML = `<img src="${session.foto}" class="profile-img">`;
                    alert("Foto atualizada!");
                };
                reader.readAsDataURL(file);
            }
        };
        document.getElementById('btn-alterar-nome').onclick = () => {
            const novo = document.getElementById('edit-nome').value.trim();
            if(!novo) return;
            session.exibe = novo;
            const idx = db.users.findIndex(u => u.nome === session.nome);
            if(idx !== -1) db.users[idx].exibe = novo;
            saveToFirebase('users', db.users);
            document.getElementById('welcome-menu').innerHTML = `<i class="fas fa-user-circle"></i> ${novo.toUpperCase()}`;
            alert("Nome atualizado!");
        };
        document.getElementById('btn-alterar-senha').onclick = () => {
            const atual = document.getElementById('edit-senha-atual').value;
            const nova = document.getElementById('edit-senha-nova').value;
            const confirma = document.getElementById('edit-senha-confirma').value;
            if(atual !== session.pass) return alert("Senha atual incorreta");
            if(nova !== confirma) return alert("Nova senha não confere");
            if(nova.length < 4) return alert("Mínimo 4 caracteres");
            session.pass = nova;
            const idx = db.users.findIndex(u => u.nome === session.nome);
            if(idx !== -1) db.users[idx].pass = nova;
            saveToFirebase('users', db.users);
            salvarSessao(session);
            alert("Senha alterada! Faça login novamente.");
            logout();
        };
        document.getElementById('btn-criar-user')?.addEventListener('click', () => {
            const nome = document.getElementById('novo-user-nome').value.trim().toLowerCase();
            const role = document.getElementById('novo-user-role').value;
            if(!nome) return;
            if(db.users.find(u => u.nome === nome)) return alert("Já existe");
            const novo = {nome, pass: "123456", role, foto: "", exibe: nome};
            db.users.push(novo);
            saveToFirebase('users', db.users);
            alert(`Usuário ${nome} (${role}) criado com senha 123456`);
            document.getElementById('novo-user-nome').value = '';
        });
        document.getElementById('voltar-perfil').onclick = () => { document.getElementById('menu-screen').classList.remove('hidden'); showScreen(''); };
        showScreen('profile-screen');
    }

    // GERENCIAR EQUIPE (apenas admin/irlan/mike)
    function carregarGerenciarEquipe() {
        const podeGerenciar = (session.role === 'admin' || session.nome === 'admin' || session.nome === 'irlan' || session.nome === 'mike');
        if(!podeGerenciar) {

            <div class="info-box">
                <label class="label-os">Adicionar técnico/auxiliar/operador</label>
                <input type="text" id="new-user-name" placeholder="Nome">
                <select id="new-user-role">

            <div id="user-list-render"></div>

        `;

            const nome = document.getElementById('new-user-name').value.trim().toLowerCase();
            const role = document.getElementById('new-user-role').value;
            if(!nome) return;
            if(db.users.find(u => u.nome === nome)) return alert("Usuário já existe");

            alert("Usuário adicionado!");
            document.getElementById('new-user-name').value = '';
        };
        document.getElementById('voltar-gerenciar').onclick = () => { document.getElementById('menu-screen').classList.remove('hidden'); showScreen(''); };

    function renderUserList() {
        const area = document.getElementById('user-list-render');
        if(!area) return;
        area.innerHTML = "";
        db.users.filter(u => u.nome !== 'admin' && u.nome !== 'irlan' && u.nome !== 'mike').forEach(u => {
            area.innerHTML += `<div class="info-box" style="display:flex; justify-content:space-between;">
                <div><b>${u.exibe || u.nome}</b> (${u.role})<br>Senha: ${u.pass}</div>
                <button onclick="removerU('${u.nome}')" style="background:#d32f2f; width:auto;">Remover</button>
            </div>`;
        });
    }
    function removerU(n) {
        if(n === session.nome) return alert("Não pode remover a si mesmo");
        db.users = db.users.filter(u => u.nome !== n);
        saveToFirebase('users', db.users);
        renderUserList();
    }

    // CONFIGURAÇÕES
    function carregarConfig() {
        const podeConfig = (session.role === 'admin' || session.nome === 'admin' || session.nome === 'mike');
        if(!podeConfig) {
            alert("Apenas administradores podem acessar configurações.");
            return;
        }
        const container = document.getElementById('config-branding-screen');
        container.innerHTML = `
            <h2>Configurações</h2>
            <input type="text" id="cfg-name" placeholder="Nome da Empresa" value="${db.config.name || ''}">
            <input type="email" id="cfg-email" placeholder="E-mail para OS concluídas" value="${db.config.emailDestino || ''}">
            <input type="file" accept="image/*" id="logo-input">
            <center><img id="cfg-logo-preview" style="max-width:100px; display:none;"></center>
            <div class="info-box">
                <label class="label-os">EmailJS (envio automático)</label>
                <input type="text" id="emailjs-service" placeholder="Service ID" value="${db.config.emailjs?.service || ''}">
                <input type="text" id="emailjs-template" placeholder="Template ID" value="${db.config.emailjs?.template || ''}">
                <input type="text" id="emailjs-public" placeholder="Public Key" value="${db.config.emailjs?.publicKey || ''}">
                <small><a href="https://www.emailjs.com/" target="_blank" style="color:#ffcc00;">Crie conta gratuita</a></small>
            </div>
            <button class="btn-primary" id="save-config">Salvar</button>
            <button class="btn-secondary" id="voltar-config">Voltar</button>
        `;
        document.getElementById('logo-input').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    tempSystemLogo = ev.target.result;
                    document.getElementById('cfg-logo-preview').src = tempSystemLogo;
                    document.getElementById('cfg-logo-preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        };
        document.getElementById('save-config').onclick = () => {
            db.config.name = document.getElementById('cfg-name').value;
            db.config.emailDestino = document.getElementById('cfg-email').value;
            db.config.emailjs = {
                service: document.getElementById('emailjs-service').value,
                template: document.getElementById('emailjs-template').value,
                publicKey: document.getElementById('emailjs-public').value
            };
            if(tempSystemLogo) db.config.logo = tempSystemLogo;
            saveToFirebase('config', db.config);
            applyBranding();
            alert("Configurações salvas!");
            document.getElementById('menu-screen').classList.remove('hidden');
            showScreen('');
        };
        document.getElementById('voltar-config').onclick = () => { document.getElementById('menu-screen').classList.remove('hidden'); showScreen(''); };
        showScreen('config-branding-screen');
    }

        <style>
            body { font-family: Arial, sans-serif; padding: 20px; }

            th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }

        </style></head><body>
        <h1>${db.config.name}</h1><h2>Relatório Completo de OS</h2><p>Gerado: ${new Date().toLocaleString()}</p><hr>`;

                Endereço: ${o.endereco || '--'}

        });
        htmlContent += `<button onclick="window.print();" style="margin-top:20px; padding:10px; background:#007bff; color:white; border:none; border-radius:8px;">Imprimir</button>
        </body></html>`;
        const win = window.open();
